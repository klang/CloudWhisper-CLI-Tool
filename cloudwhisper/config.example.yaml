# CloudWhisper Configuration Example
# Copy this file to ~/.cloudwhisper/config.yaml and customize

# AWS Configuration
aws:
  default_region: eu-west-1
  profile: default  # AWS profile to use (from ~/.aws/credentials)
  # Alternative profiles for different environments:
  # profile: sandbox
  # profile: production
  # profile: development

# OpenAI Configuration (for Terraform generation)
openai:
  api_key: your_openai_api_key_here
  model: gpt-4
  temperature: 0.1
  max_tokens: 2000

# AWS Bedrock Configuration (alternative to OpenAI)
bedrock:
  region: us-east-1  # Bedrock region (may differ from default AWS region)
  model_id: "eu.anthropic.claude-3-7-sonnet-20250219-v1:0"  # Default model
  max_tokens: 2000
  temperature: 0.1
  # Alternative models available:
  # - anthropic.claude-3-haiku-20240307-v1:0 (faster, cheaper)
  # - anthropic.claude-3-opus-20240229-v1:0 (most capable)
  # - amazon.titan-text-express-v1 (Amazon's model)
  # - ai21.j2-ultra-v1 (AI21 Labs)
  # - cohere.command-text-v14 (Cohere)

# LLM Provider Selection (openai or bedrock)
llm:
  provider: openai  # Change to 'bedrock' to use AWS Bedrock instead of OpenAI

# Cost Analysis Settings
cost_analysis:
  default_days: 30
  default_granularity: DAILY
  currency: USD

# Optimization Settings
optimization:
  cpu_threshold_low: 10    # CPU % below which instances are considered underutilized
  cpu_threshold_high: 80   # CPU % above which instances may need upsizing
  idle_days_threshold: 7   # Days to look back for idle resource detection

# Terraform Settings
terraform:
  default_provider_version: "~> 5.0"
  include_tags: true
  default_tags:
    Environment: dev
    ManagedBy: CloudWhisper
    Project: infrastructure

# Output Settings
output:
  format: table  # table, json, yaml
  show_colors: true
  max_rows: 50
